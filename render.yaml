# Render Blueprint：https://render.com/docs/blueprint-spec
services:
  - type: web
    name: zhisheng-global
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: FINMIND_TOKEN
        sync: false
      - key: SEED_ADMIN_TOKEN
        sync: false
      - key: SEED_WEBHOOK_URL
        sync: false
      - key: SEED_LIST_PATH
        sync: false
